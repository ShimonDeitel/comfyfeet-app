name: Comfyfeet
options:
  bundleIdPrefix: com.shimondeitel.coldfeetlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Comfyfeet:
    type: application
    platform: iOS
    sources:
      - path: Comfyfeet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldfeetlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Comfyfeet/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ComfyfeetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ComfyfeetTests
      - path: Comfyfeet.storekit
    dependencies:
      - target: Comfyfeet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldfeetlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ComfyfeetUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ComfyfeetUITests
    dependencies:
      - target: Comfyfeet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldfeetlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Comfyfeet:
    build:
      targets:
        Comfyfeet: all
        ComfyfeetTests: [test]
        ComfyfeetUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Comfyfeet.storekit
    test:
      config: Debug
      storeKitConfiguration: Comfyfeet.storekit
      targets:
        - ComfyfeetTests
        - ComfyfeetUITests
    archive:
      config: Release
